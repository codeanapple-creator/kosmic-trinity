kind = "web"
previewPath = "/"
title = "Kosmic Trinity"
version = "1.0.0"
id = "artifacts/kosmic-trinity"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25407

[services.development]
run = "pnpm --filter @workspace/kosmic-trinity run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kosmic-trinity", "run", "build" ]
publicDir = "artifacts/kosmic-trinity/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25407"
BASE_PATH = "/"
